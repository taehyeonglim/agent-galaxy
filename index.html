<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Agent Galaxy</title>
<!--
  agent-galaxy — see your AI agent team as a living galaxy.
  Teams are planets, agents orbit as satellites, handoffs stream between stars.
  Data contract: data.json (see docs/SCHEMA.md). Engine: manual 3D projection on Canvas 2D.
-->
<link rel="stylesheet" href="cinema.css">
</head>
<body>
<canvas id="bg"></canvas>
<div class="nebula"></div>
<canvas id="gx"></canvas>

<div class="hud">
  <div class="hud-top">
    <div class="brand"><span class="logo" id="t-logo"></span><span class="sub" id="t-sub"></span><span class="ver" id="t-ver"></span></div>
  </div>
  <div class="hud-center"><span>3D GALAXY</span><span class="beatdot">●</span><span id="clock">--:--:--</span></div>
  <div class="legend" id="legend"></div>
  <div class="controls">
    <button class="ctl" id="btn-fs">⛶ FULLSCREEN</button>
    <button class="ctl on" id="btn-spin">◐ AUTO-ORBIT</button>
    <button class="ctl" id="btn-replay">↻ REPLAY</button>
  </div>
  <div class="hint">drag = orbit camera · wheel = zoom · hover a planet = agents · F = fullscreen</div>
</div>

<div id="pop"></div>
<div class="scanlines"></div><div class="grain"></div><div class="vignette"></div><div class="frame"></div>

<div class="boot" id="boot"><div class="boot-in">
  <div class="boot-logo" id="boot-logo"></div>
  <div class="boot-lines" id="boot-lines"></div>
  <div class="boot-bar"><i></i></div>
</div></div>

<script type="module" src="cinema.js"></script>
</body>
</html>
